name: Build SMD Tool (Auto-Fetch)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync

    - name: Download & Extract Latest Tools (Auto-Fetch)
      shell: pwsh
      run: |
        # --- 1. Xử lý Aria2 ---
        Write-Host "Fetching Aria2 releases..."
        $ariaReleases = Invoke-RestMethod -Uri "https://api.github.com/repos/jericjan/aria2/releases"
        $ariaLatest = $ariaReleases[0]
        
        $ariaAsset = $ariaLatest.assets | Where-Object { $_.name -like "*windows.zip" } | Select-Object -First 1
        
        if ($null -ne $ariaAsset) {
            $ariaZipUrl = $ariaAsset.browser_download_url
            Write-Host "Found Windows version: $($ariaAsset.name)"
        } else {
            Write-Error "Không tìm thấy bản cho Windows của Aria2!"
            exit 1
        }
        
        Write-Host "Downloading Aria2 from: $ariaZipUrl"
        Invoke-WebRequest -Uri $ariaZipUrl -OutFile "aria2_temp.zip"
        
        Write-Host "Extracting Aria2..."
        Expand-Archive -Path "aria2_temp.zip" -DestinationPath "temp_aria2" -Force
        
        New-Item -ItemType Directory -Force -Path "third_party/aria2c"
        $ariaExe = Get-ChildItem -Path "temp_aria2" -Filter "aria2c.exe" -Recurse | Select-Object -First 1
        if ($null -ne $ariaExe) {
            Copy-Item -Path $ariaExe.FullName -Destination "third_party/aria2c/aria2c.exe" -Force
            Write-Host "Copied aria2c.exe successfully."
        } else {
            Write-Error "LỖI: Không tìm thấy aria2c.exe!"
            exit 1
        }

        # --- 2. Xử lý GBE Fork Tools ---
        Write-Host "Fetching GBE Fork Tools releases..."
        $gbeReleases = Invoke-RestMethod -Uri "https://api.github.com/repos/Detanup01/gbe_fork_tools/releases"
        $gbeLatest = $gbeReleases[0]
        
        $gbeAsset = $gbeLatest.assets | Where-Object { $_.name -match "win" -and $_.name -like "*.zip" } | Select-Object -First 1
        
        if ($null -ne $gbeAsset) {
            $gbeZipUrl = $gbeAsset.browser_download_url
            Write-Host "Found Windows version: $($gbeAsset.name)"
        } else {
            Write-Error "Không tìm thấy bản cho Windows của GBE Fork Tools!"
            exit 1
        }
        
        Write-Host "Downloading GBE Fork Tools from: $gbeZipUrl"
        Invoke-WebRequest -Uri $gbeZipUrl -OutFile "gbe_temp.zip"
        
        Write-Host "Extracting GBE Fork Tools..."
        Expand-Archive -Path "gbe_temp.zip" -DestinationPath "temp_gbe" -Force
        
        New-Item -ItemType Directory -Force -Path "third_party/gbe_fork_tools"
        $gbeFolder = Get-ChildItem -Path "temp_gbe" -Filter "generate_emu_config" -Recurse -Directory | Select-Object -First 1
        if ($null -ne $gbeFolder) {
            Copy-Item -Path $gbeFolder.FullName -Destination "third_party/gbe_fork_tools/" -Recurse -Force
            Write-Host "Copied generate_emu_config successfully."
        } else {
            Write-Error "LỖI: Không tìm thấy thư mục generate_emu_config!"
            exit 1
        }

        # --- Dọn dẹp rác ---
        Remove-Item "aria2_temp.zip" -Force
        Remove-Item "gbe_temp.zip" -Force
        Remove-Item "temp_aria2" -Recurse -Force
        Remove-Item "temp_gbe" -Recurse -Force

    - name: Setup GCC (MinGW)
      uses: egor-tensin/setup-gcc@v1
      with:
        platform: x64

    - name: Build C Library (MIDI Player)
      run: |
        cd c
        gcc midi_player_lib.c -shared -fPIC -o midi_player_lib.dll
        cd ..

    - name: Build EXE with PyInstaller
      run: |
        uv run pyinstaller main.spec

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SMD-Release-Windows
        path: dist/